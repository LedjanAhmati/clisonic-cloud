# Production Environment Values
# Used by: deploy.yml, deploy-helm.yml

replicaCount: 3

image:
  tag: "latest"

resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 1000m
    memory: 1024Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  - name: ENVIRONMENT
    value: "production"
  - name: LOG_LEVEL
    value: "info"
  - name: DEBUG
    value: "false"

ingress:
  enabled: true
  hosts:
    - host: clisonix.com
      paths:
        - path: /
          pathType: Prefix
    - host: www.clisonix.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: clisonix-tls
      hosts:
        - clisonix.com
        - www.clisonix.com
