# Staging Environment Values
# Used by: deploy.yml, deploy-helm.yml

replicaCount: 1

image:
  tag: "staging"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  - name: ENVIRONMENT
    value: "staging"
  - name: LOG_LEVEL
    value: "debug"
  - name: DEBUG
    value: "true"

ingress:
  enabled: true
  hosts:
    - host: staging.clisonix.com
      paths:
        - path: /
          pathType: Prefix
