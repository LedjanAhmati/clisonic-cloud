events {
    worker_connections 1024;
}

http {
    upstream clisonix_backend {
        server clisonix-api:8000;
    }

    upstream clisonix_ocean {
        server clisonix-ocean-core:8030;
    }

    upstream clisonix_web {
        server clisonix-web:3000;
    }

    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/s;

    server {
        listen 80;
        server_name clisonix.com www.clisonix.com localhost;
        client_max_body_size 100M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        # ALL Ocean endpoints - route to ocean-core (MUST BE BEFORE /api/)
        location /api/ocean/ {
            limit_req zone=api_limit burst=500 nodelay;

            # Rewrite /api/ocean/chat to /api/v1/chat
            rewrite ^/api/ocean/(.*)$ /api/v1/$1 break;

            proxy_pass http://clisonix_ocean;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # Regular API endpoints (go to main backend)
        location /api/ {
            limit_req zone=api_limit burst=500 nodelay;

            proxy_pass http://clisonix_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Main web app
        location / {
            limit_req zone=general_limit burst=200 nodelay;

            proxy_pass http://clisonix_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static files caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://clisonix_web;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
